<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>연차 관리</title>

<style>
body {
  margin: 0;
  padding: 16px;
  background: #f2f2f7;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.app {
  max-width: 420px;
  margin: auto;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 {
  margin: 0 0 12px;
  font-size: 18px;
}

.total {
  font-size: 15px;
  margin-bottom: 18px;
}

.section {
  margin-bottom: 20px;
}

.label {
  font-size: 14px;
  margin-bottom: 6px;
}

.progress {
  height: 18px;
  background: #e5e5ea;
  border-radius: 9px;
  overflow: hidden;
}

.bar {
  height: 100%;
  transition: width 0.3s ease;
}

.bar.required { background: #007aff; }
.bar.cash { background: #34c759; }

.buttons button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: #fff;
}

.buttons button:disabled {
  background: #c7c7cc;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

li {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

.month {
  margin-top: 12px;
  font-weight: 600;
  font-size: 14px;
}

.delete {
  color: #ff3b30;
}
</style>
</head>

<body>
<div class="app">

<div class="card">
  <h2>연차 사용 현황</h2>
  <div class="total" id="totalUsed"></div>

  <div class="section">
    <div class="label" id="requiredLabel"></div>
    <div class="progress"><div class="bar required" id="requiredBar"></div></div>
  </div>

  <div class="section">
    <div class="label" id="cashLabel"></div>
    <div class="progress"><div class="bar cash" id="cashBar"></div></div>
  </div>
</div>

<div class="card buttons">
  <button onclick="addLeave(8)">연차 8시간</button>
  <button onclick="addLeave(7)">연차 7시간</button>
  <button onclick="addLeave(4)">반차 4시간</button>
  <button onclick="addLeave(2)">1/4차 2시간</button>
</div>

<div class="card">
  <h2>사용 기록</h2>
  <ul id="records"></ul>
</div>

</div>

<!-- iOS 대응용 hidden date input -->
<input type="date" id="datePicker" style="position:absolute;opacity:0;pointer-events:none;">

<script>
const REQUIRED_TOTAL = 86;
const CASH_TOTAL = 42;
const TOTAL_LIMIT = 128;

let state = JSON.parse(localStorage.getItem("leaveState")) || { records: [] };
let editingIndex = null;

const datePicker = document.getElementById("datePicker");
datePicker.onchange = () => {
  if (editingIndex !== null) {
    state.records[editingIndex].date = datePicker.value;
    save(); render();
    editingIndex = null;
  }
};

function today() {
  return new Date().toISOString().split("T")[0];
}

function totalUsed() {
  return state.records.reduce((s, r) => s + r.hours, 0);
}

function addLeave(hours) {
  if (totalUsed() + hours > TOTAL_LIMIT) {
    alert("모든 연차(128시간)를 이미 소진했습니다.");
    return;
  }
  state.records.push({ date: today(), hours });
  save(); render();
}

function editDate(index) {
  editingIndex = index;
  datePicker.value = state.records[index].date;
  datePicker.click();
}

function removeRecord(index) {
  state.records.splice(index, 1);
  save(); render();
}

function save() {
  localStorage.setItem("leaveState", JSON.stringify(state));
}

function render() {
  const used = totalUsed();
  document.getElementById("totalUsed").textContent = `총 사용: ${used}시간`;

  const requiredRemain = Math.max(0, REQUIRED_TOTAL - Math.min(used, REQUIRED_TOTAL));
  const cashRemain = Math.max(0, CASH_TOTAL - Math.max(0, used - REQUIRED_TOTAL));

  document.getElementById("requiredLabel").textContent = `필수 소진 남음: ${requiredRemain}시간`;
  document.getElementById("cashLabel").textContent = `정산 가능 남음: ${cashRemain}시간`;

  document.getElementById("requiredBar").style.width = `${(requiredRemain / REQUIRED_TOTAL) * 100}%`;
  document.getElementById("cashBar").style.width = `${(cashRemain / CASH_TOTAL) * 100}%`;

  document.querySelectorAll(".buttons button")
    .forEach(btn => btn.disabled = used >= TOTAL_LIMIT);

  const ul = document.getElementById("records");
  ul.innerHTML = "";

  const grouped = {};
  state.records.forEach((r, i) => {
    const month = r.date.slice(0,7);
    if (!grouped[month]) grouped[month] = [];
    grouped[month].push({ ...r, index: i });
  });

  Object.keys(grouped).sort().reverse().forEach(month => {
    const m = document.createElement("div");
    m.className = "month";
    m.textContent = month;
    ul.appendChild(m);

    grouped[month]
      .sort((a,b) => b.date.localeCompare(a.date))
      .forEach(r => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span onclick="editDate(${r.index})">${r.date} · ${r.hours}h</span>
          <span class="delete" onclick="removeRecord(${r.index})">삭제</span>
        `;
        ul.appendChild(li);
      });
  });
}

render();
</script>
</body>
</html>
