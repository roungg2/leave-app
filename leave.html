<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>연차 관리</title>

<style>
body {
  margin: 0;
  padding: 16px;
  background: #f2f2f7;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.app {
  max-width: 420px;
  margin: auto;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 {
  margin: 0 0 12px;
  font-size: 18px;
}

.total {
  font-size: 15px;
  margin-bottom: 18px;
  color: #333;
}

.section {
  margin-bottom: 18px;
}

.label {
  font-size: 14px;
  margin-bottom: 6px;
  color: #555;
}

.progress {
  height: 18px;
  background: #e5e5ea;
  border-radius: 9px;
  overflow: hidden;
}

.bar {
  height: 100%;
  transition: width 0.3s ease;
}

.bar.required {
  background: #007aff;
}

.bar.cash {
  background: #34c759;
}

.buttons button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: #fff;
}

.buttons button:active {
  opacity: 0.7;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

li {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

li span {
  cursor: pointer;
}

.delete {
  color: #ff3b30;
  margin-left: 8px;
}
</style>
</head>

<body>
<div class="app">

  <div class="card">
    <h2>연차 사용 현황</h2>
    <div class="total" id="totalUsed">총 사용: 0시간</div>

    <div class="section">
      <div class="label" id="requiredLabel">필수 소진 남음: 86시간</div>
      <div class="progress">
        <div class="bar required" id="requiredBar"></div>
      </div>
    </div>

    <div class="section">
      <div class="label" id="cashLabel">정산 가능 남음: 42시간</div>
      <div class="progress">
        <div class="bar cash" id="cashBar"></div>
      </div>
    </div>
  </div>

  <div class="card buttons">
    <button onclick="addLeave(8)">연차 8시간</button>
    <button onclick="addLeave(7)">연차 7시간</button>
    <button onclick="addLeave(4)">반차 4시간</button>
    <button onclick="addLeave(2)">1/4차 2시간</button>
  </div>

  <div class="card">
    <h2>사용 기록</h2>
    <ul id="records"></ul>
  </div>

</div>

<script>
const REQUIRED_TOTAL = 86;
const CASH_TOTAL = 42;

let state = JSON.parse(localStorage.getItem("leaveState")) || {
  records: []
};

function today() {
  return new Date().toISOString().split("T")[0];
}

function addLeave(hours) {
  state.records.push({ date: today(), hours });
  save();
  render();
}

function save() {
  localStorage.setItem("leaveState", JSON.stringify(state));
}

function removeRecord(index) {
  state.records.splice(index, 1);
  save();
  render();
}

function editDate(index) {
  const input = document.createElement("input");
  input.type = "date";
  input.value = state.records[index].date;
  input.onchange = () => {
    state.records[index].date = input.value;
    save();
    render();
  };
  input.click();
}

function render() {
  const totalUsed = state.records.reduce((s, r) => s + r.hours, 0);
  document.getElementById("totalUsed").textContent = `총 사용: ${totalUsed}시간`;

  const requiredUsed = Math.min(totalUsed, REQUIRED_TOTAL);
  const requiredRemain = Math.max(0, REQUIRED_TOTAL - requiredUsed);

  const cashUsed = Math.max(0, totalUsed - REQUIRED_TOTAL);
  const cashRemain = Math.max(0, CASH_TOTAL - cashUsed);

  document.getElementById("requiredLabel").textContent =
    `필수 소진 남음: ${requiredRemain}시간`;
  document.getElementById("cashLabel").textContent =
    `정산 가능 남음: ${cashRemain}시간`;

  document.getElementById("requiredBar").style.width =
    `${(requiredRemain / REQUIRED_TOTAL) * 100}%`;
  document.getElementById("cashBar").style.width =
    `${(cashRemain / CASH_TOTAL) * 100}%`;

  const ul = document.getElementById("records");
  ul.innerHTML = "";

  const sorted = state.records
    .map((r, i) => ({ ...r, index: i }))
    .sort((a, b) => b.date.localeCompare(a.date));

  sorted.forEach(r => {
    const li = document.createElement("li");
    li.innerHTML = `
      <span onclick="editDate(${r.index})">${r.date} · ${r.hours}h</span>
      <span class="delete" onclick="removeRecord(${r.index})">삭제</span>
    `;
    ul.appendChild(li);
  });
}

render();
</script>
</body>
</html>
