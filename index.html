<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>연차 관리</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #f2f2f7;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.app {
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 12px rgba(0,0,0,.06);
}

h2 {
  margin: 0;
  font-size: 18px;
}

.settings-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 12px;
}

button.action {
  padding: 14px 0;
  border: none;
  border-radius: 14px;
  background: #007aff;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
}

button.gray {
  background: #8e8e93;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

select {
  padding: 6px 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.bar-wrap {
  background: #e5e5ea;
  border-radius: 12px;
  height: 24px;
  overflow: hidden;
  margin-bottom: 14px;
}

.bar {
  height: 100%;
  transition: width .3s;
}

.mandatory { background: #007aff; }
.cash { background: #34c759; }

ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

li input[type="date"] {
  border: none;
  font-size: 14px;
}

.delete {
  color: #ff3b30;
  font-size: 13px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 320px;
  border-radius: 18px;
  padding: 18px;
}

.modal-content h3 {
  margin: 0 0 14px;
}

.modal-content input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.save-btn { width: 160px; }
.reset-btn { width: 110px; }
</style>
</head>

<body>
<div class="app">

  <div class="card">
    <div class="row">
      <h2>연차 사용</h2>
      <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </div>
    <div class="buttons">
      <button class="action" onclick="useLeave(8)">연차 8시간</button>
      <button class="action" onclick="useLeave(7)">연차 7시간</button>
      <button class="action" onclick="useLeave(4)">반차 4시간</button>
      <button class="action" onclick="useLeave(2)">1/4차 2시간</button>
    </div>
  </div>

  <div class="card">
    <h2>연차 현황</h2>

    <div class="row"><span>총 사용</span><span id="used">0h</span></div>

    <div class="row"><span>필수 소진</span><span id="mandatoryLeft">0h</span></div>
    <div class="bar-wrap"><div class="bar mandatory" id="mandatoryBar"></div></div>

    <div class="row"><span>정산 가능</span><span id="cashLeft">0h</span></div>
    <div class="bar-wrap"><div class="bar cash" id="cashBar"></div></div>
  </div>

  <div class="card">
    <div class="row">
      <h2>사용 기록</h2>
      <select id="monthFilter" onchange="changeMonth(this.value)">
        <option value="all">전체</option>
      </select>
    </div>
    <ul id="history"></ul>
  </div>

</div>

<div class="modal" id="configModal">
  <div class="modal-content">
    <h3>연차 설정</h3>

    <input id="totalInput" type="number" placeholder="총 연차 시간 (예: 128)">
    <input id="mandatoryInput" type="number" placeholder="필수 소진 시간 (예: 86)">
    <input id="cashInput" type="number" placeholder="정산 가능 시간 (예: 42)">

    <div class="modal-actions">
      <button class="action gray reset-btn" onclick="resetAll()">초기화</button>
      <button class="action save-btn" onclick="saveConfig()">저장</button>
    </div>
  </div>
</div>

<script>
let config = JSON.parse(localStorage.getItem("leaveConfig"));
let records = JSON.parse(localStorage.getItem("leaveRecords") || "[]");
let selectedMonth = "all";

const usedEl = document.getElementById("used");
const mandatoryLeftEl = document.getElementById("mandatoryLeft");
const cashLeftEl = document.getElementById("cashLeft");
const mandatoryBar = document.getElementById("mandatoryBar");
const cashBar = document.getElementById("cashBar");
const historyEl = document.getElementById("history");
const monthFilter = document.getElementById("monthFilter");

function today() {
  return new Date().toISOString().slice(0,10);
}

function openSettings() {
  document.getElementById("configModal").style.display = "flex";
}

function saveConfig() {
  const t = +totalInput.value;
  const m = +mandatoryInput.value;
  const c = +cashInput.value;

  if (!t || !m || !c) {
    alert("모든 시간을 입력해주세요.");
    return;
  }

  config = { total:t, mandatory:m, cash:c };
  localStorage.setItem("leaveConfig", JSON.stringify(config));
  localStorage.setItem("leaveConfigured", "true");
  document.getElementById("configModal").style.display = "none";
  render();
}

function resetAll() {
  if (!confirm("모든 기록과 설정을 초기화할까요?")) return;
  localStorage.clear();
  location.reload();
}

function usedHours() {
  return records.reduce((a,b)=>a+b.hours,0);
}

function useLeave(h) {
  if (usedHours() + h > config.total) {
    alert("모든 연차가 소진되었습니다.");
    return;
  }
  records.push({ date: today(), hours: h });
  localStorage.setItem("leaveRecords", JSON.stringify(records));
  render();
}

function changeMonth(v) {
  selectedMonth = v;
  render();
}

function render() {
  if (!config) return;

  const used = usedHours();
  usedEl.textContent = used + "h";

  const mandatoryLeft = Math.max(0, config.mandatory - used);
  const cashLeft = Math.max(0, config.cash - Math.max(0, used - config.mandatory));

  mandatoryLeftEl.textContent = mandatoryLeft + "h";
  cashLeftEl.textContent = cashLeft + "h";

  mandatoryBar.style.width = (mandatoryLeft / config.mandatory * 100) + "%";
  cashBar.style.width = (cashLeft / config.cash * 100) + "%";

  if (monthFilter.options.length === 1) {
    [...new Set(records.map(r => r.date.slice(0,7)))].forEach(m => {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      monthFilter.appendChild(opt);
    });
  }

  historyEl.innerHTML = "";

  [...records].reverse().forEach((r, idx) => {
    const i = records.length - 1 - idx;

    if (selectedMonth !== "all" && !r.date.startsWith(selectedMonth)) return;

    const li = document.createElement("li");
    li.innerHTML = `
      <input type="date" value="${r.date}"
        onchange="records[${i}].date=this.value;localStorage.setItem('leaveRecords',JSON.stringify(records))">
      <span>${r.hours}h</span>
      <span class="delete"
        onclick="records.splice(${i},1);localStorage.setItem('leaveRecords',JSON.stringify(records));render()">삭제</span>
    `;
    historyEl.appendChild(li);
  });

  monthFilter.value = selectedMonth;
}

render();

if (!localStorage.getItem("leaveConfigured")) {
  openSettings();
}
</script>
</body>
</html>
