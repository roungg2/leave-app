<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>연차 관리</title>

<style>
body {
  margin: 0;
  padding: 16px;
  background: #f2f2f7;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.app { max-width: 420px; margin: auto; }

.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 { margin: 0 0 12px; font-size: 18px; }

.total { margin-bottom: 18px; }

.progress {
  height: 18px;
  background: #e5e5ea;
  border-radius: 9px;
  overflow: hidden;
}

.bar { height: 100%; transition: width .3s; }
.required { background:#007aff; }
.cash { background:#34c759; }

.buttons button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: #fff;
}

.buttons button:disabled { background:#c7c7cc; }

select {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.record {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid #eee;
  padding: 10px 0;
  font-size: 14px;
}

.record-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.record-actions {
  margin-top: 6px;
  display: flex;
  gap: 8px;
}

.record-actions button {
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  background: #efeff4;
}

.delete { color:#ff3b30; }
</style>
</head>

<body>
<div class="app">

<div class="card">
  <h2>연차 사용 현황</h2>
  <div class="total" id="totalUsed"></div>

  <div>필수 소진 남음: <span id="requiredRemain"></span></div>
  <div class="progress"><div class="bar required" id="requiredBar"></div></div>

  <div style="margin-top:12px;">정산 가능 남음: <span id="cashRemain"></span></div>
  <div class="progress"><div class="bar cash" id="cashBar"></div></div>
</div>

<div class="card buttons">
  <button onclick="addLeave(8)">연차 8시간</button>
  <button onclick="addLeave(7)">연차 7시간</button>
  <button onclick="addLeave(4)">반차 4시간</button>
  <button onclick="addLeave(2)">1/4차 2시간</button>
</div>

<div class="card">
  <h2>사용 기록</h2>
  <select id="monthFilter" onchange="render()"></select>
  <div id="records"></div>
</div>

</div>

<script>
const REQUIRED_TOTAL = 86;
const CASH_TOTAL = 42;
const TOTAL_LIMIT = 128;

let state = JSON.parse(localStorage.getItem("leaveState")) || { records: [] };

function today() {
  return new Date().toISOString().split("T")[0];
}

function totalUsed() {
  return state.records.reduce((s,r)=>s+r.hours,0);
}

function addLeave(hours) {
  if (totalUsed()+hours > TOTAL_LIMIT) {
    alert("모든 연차(128시간)를 이미 소진했습니다.");
    return;
  }
  state.records.push({ date: today(), hours });
  save(); render();
}

function save() {
  localStorage.setItem("leaveState", JSON.stringify(state));
}

function render() {
  const used = totalUsed();
  document.getElementById("totalUsed").textContent = `총 사용: ${used}시간`;

  const reqRemain = Math.max(0, REQUIRED_TOTAL - Math.min(used, REQUIRED_TOTAL));
  const cashRemain = Math.max(0, CASH_TOTAL - Math.max(0, used - REQUIRED_TOTAL));

  document.getElementById("requiredRemain").textContent = reqRemain;
  document.getElementById("cashRemain").textContent = cashRemain;

  document.getElementById("requiredBar").style.width = `${reqRemain/REQUIRED_TOTAL*100}%`;
  document.getElementById("cashBar").style.width = `${cashRemain/CASH_TOTAL*100}%`;

  document.querySelectorAll(".buttons button")
    .forEach(b=>b.disabled = used>=TOTAL_LIMIT);

  // 월 필터
  const months = [...new Set(state.records.map(r=>r.date.slice(0,7)))].sort();
  const filter = document.getElementById("monthFilter");
  if (!filter.options.length) {
    filter.innerHTML = `<option value="">전체</option>` +
      months.map(m=>`<option value="${m}">${m}</option>`).join("");
  }

  const selected = filter.value;
  const list = document.getElementById("records");
  list.innerHTML = "";

  state.records
    .map((r,i)=>({...r,i}))
    .filter(r=>!selected || r.date.startsWith(selected))
    .sort((a,b)=>b.date.localeCompare(a.date))
    .forEach(r=>{
      const div = document.createElement("div");
      div.className="record";
      div.innerHTML = `
        <div class="record-top">
          <span>${r.date} · ${r.hours}h</span>
        </div>
        <div class="record-actions">
          <input type="date" value="${r.date}" onchange="state.records[${r.i}].date=this.value;save();render();">
          <button class="delete" onclick="state.records.splice(${r.i},1);save();render();">삭제</button>
        </div>
      `;
      list.appendChild(div);
    });
}

render();
</script>
</body>
</html>
