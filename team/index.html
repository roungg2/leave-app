<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>연차 관리</title>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  background: #f2f2f7;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.app {
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}
h2 { margin: 0 0 12px; font-size: 18px; }

.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
button {
  padding: 14px 0;
  border: none;
  border-radius: 12px;
  background: #007aff;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
}
button.gray { background: #8e8e93; }

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
select {
  padding: 6px 10px;
  border-radius: 10px;
}

.bar-wrap {
  background: #e5e5ea;
  border-radius: 12px;
  height: 22px;
  overflow: hidden;
  margin-bottom: 12px;
}
.bar { height: 100%; transition: width .3s; }
.mandatory { background: #007aff; }
.cash { background: #34c759; }

ul { list-style: none; padding: 0; margin: 0; }
li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}
li input[type="date"] {
  border: none;
  font-size: 14px;
}
.delete { color: #ff3b30; font-size: 13px; }
</style>
</head>

<body>
<div class="app">

  <div class="card">
    <div class="row">
      <h2>연차 사용</h2>
    </div>
    <div class="buttons">
      <button onclick="useLeave(8)">연차 8시간</button>
      <button onclick="useLeave(7)">연차 7시간</button>
      <button onclick="useLeave(4)">반차 4시간</button>
      <button onclick="useLeave(2)">1/4차 2시간</button>
    </div>
  </div>

  <div class="card">
    <h2>연차 현황</h2>

    <div class="row"><span>총 사용</span><span id="used">0h</span></div>
    <div class="row"><span>필수 소진</span><span id="mandatoryLeft">0h</span></div>
    <div class="bar-wrap"><div class="bar mandatory" id="mandatoryBar"></div></div>

    <div class="row"><span>정산 가능</span><span id="cashLeft">0h</span></div>
    <div class="bar-wrap"><div class="bar cash" id="cashBar"></div></div>
  </div>

  <div class="card">
    <div class="row">
      <h2>사용 기록</h2>
      <select id="monthFilter" onchange="changeMonth(this.value)">
        <option value="all">전체</option>
      </select>
    </div>
    <ul id="history"></ul>
  </div>

</div>

<script>
let config = { total:128, mandatory:86, cash:42 };
let records = JSON.parse(localStorage.getItem("leaveRecords") || "[]");
let selectedMonth = "all";

const usedEl = document.getElementById("used");
const mandatoryLeftEl = document.getElementById("mandatoryLeft");
const cashLeftEl = document.getElementById("cashLeft");
const mandatoryBar = document.getElementById("mandatoryBar");
const cashBar = document.getElementById("cashBar");
const historyEl = document.getElementById("history");
const monthFilter = document.getElementById("monthFilter");

function today() {
  return new Date().toISOString().slice(0,10);
}

function usedHours() {
  return records.reduce((a,b)=>a+b.hours,0);
}

function useLeave(h) {
  if (usedHours() + h > config.total) {
    alert("모든 연차가 소진되었습니다.");
    return;
  }
  records.push({ date: today(), hours: h });
  localStorage.setItem("leaveRecords", JSON.stringify(records));
  render();
}

function changeMonth(value) {
  selectedMonth = value;
  render();
}

function render() {
  const used = usedHours();
  usedEl.textContent = used + "h";

  const mandatoryLeft = Math.max(0, config.mandatory - used);
  const cashLeft = Math.max(0, config.cash - Math.max(0, used - config.mandatory));

  mandatoryLeftEl.textContent = mandatoryLeft + "h";
  cashLeftEl.textContent = cashLeft + "h";

  mandatoryBar.style.width = (mandatoryLeft / config.mandatory * 100) + "%";
  cashBar.style.width = (cashLeft / config.cash * 100) + "%";

  // 월 옵션 최초 1회 생성
  if (monthFilter.options.length === 1) {
    const months = [...new Set(records.map(r => r.date.slice(0,7)))];
    months.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      monthFilter.appendChild(opt);
    });
  }

  historyEl.innerHTML = "";
  records.forEach((r,i) => {
    if (selectedMonth !== "all" && !r.date.startsWith(selectedMonth)) return;

    const li = document.createElement("li");
    li.innerHTML = `
      <input type="date" value="${r.date}"
        onchange="records[${i}].date=this.value;localStorage.setItem('leaveRecords',JSON.stringify(records))">
      <span>${r.hours}h</span>
      <span class="delete" onclick="records.splice(${i},1);localStorage.setItem('leaveRecords',JSON.stringify(records));render()">삭제</span>
    `;
    historyEl.appendChild(li);
  });

  monthFilter.value = selectedMonth;
}

render();
</script>
</body>
</html>
