<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="연차관리">
<meta name="theme-color" content="#f2f2f7">

<title>연차 관리</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #f2f2f7;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.app {
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 12px rgba(0,0,0,.06);
}

h2 {
  margin: 0 0 12px;
  font-size: 18px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

button {
  padding: 14px 0;
  font-size: 15px;
  border: none;
  border-radius: 12px;
  background: #007aff;
  color: #fff;
  font-weight: 600;
  touch-action: manipulation;
}

button:disabled {
  background: #c7c7cc;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 6px;
}

.bar-wrap {
  background: #e5e5ea;
  border-radius: 12px;
  height: 20px;
  overflow: hidden;
  margin-bottom: 12px;
}

.bar {
  height: 100%;
  transition: width .3s;
}

.mandatory { background: #007aff; }
.cash { background: #34c759; }

/* 설정 모달 */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 320px;
  border-radius: 16px;
  padding: 16px;
}

.modal-content h3 {
  margin: 0 0 12px;
  font-size: 17px;
}

.modal-content p {
  font-size: 13px;
  color: #666;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>
<div class="app">

  <div class="card">
    <h2>연차 사용</h2>
    <div class="buttons">
      <button onclick="useLeave(8)">연차 8시간</button>
      <button onclick="useLeave(7)">연차 7시간</button>
      <button onclick="useLeave(4)">반차 4시간</button>
      <button onclick="useLeave(2)">1/4차 2시간</button>
    </div>
  </div>

  <div class="card">
    <h2>연차 사용 현황</h2>

    <div class="row">
      <span>총 사용 시간</span>
      <span id="used">0h</span>
    </div>

    <div class="row">
      <span>필수 소진</span>
      <span id="mandatoryLeft">0h</span>
    </div>
    <div class="bar-wrap">
      <div class="bar mandatory" id="mandatoryBar"></div>
    </div>

    <div class="row">
      <span>정산 가능</span>
      <span id="cashLeft">0h</span>
    </div>
    <div class="bar-wrap">
      <div class="bar cash" id="cashBar"></div>
    </div>
  </div>

</div>

<!-- 설정 팝업 -->
<div class="modal" id="configModal">
  <div class="modal-content">
    <h3>연차 설정</h3>
    <p>회사 기준 연차 시간을 입력하세요</p>
    <input id="totalInput" type="number" placeholder="총 연차 시간 (예: 128)">
    <input id="mandatoryInput" type="number" placeholder="필수 소진 시간 (예: 86)">
    <input id="cashInput" type="number" placeholder="정산 가능 시간 (예: 42)">
    <button onclick="saveConfig()">저장</button>
  </div>
</div>

<script>
let config = JSON.parse(localStorage.getItem("leaveConfig"));
let records = JSON.parse(localStorage.getItem("leaveRecords") || "[]");

function init() {
  if (!config) {
    document.getElementById("configModal").style.display = "flex";
  } else {
    render();
  }
}

function saveConfig() {
  config = {
    total: +totalInput.value,
    mandatory: +mandatoryInput.value,
    cash: +cashInput.value
  };
  localStorage.setItem("leaveConfig", JSON.stringify(config));
  document.getElementById("configModal").style.display = "none";
  render();
}

function usedHours() {
  return records.reduce((a,b)=>a+b,0);
}

function useLeave(h) {
  if (usedHours() + h > config.total) {
    alert("모든 연차가 소진되었습니다.");
    return;
  }
  records.push(h);
  localStorage.setItem("leaveRecords", JSON.stringify(records));
  render();
}

function render() {
  const used = usedHours();
  document.getElementById("used").textContent = used + "h";

  const mandatoryLeft = Math.max(0, config.mandatory - used);
  const cashLeft = Math.max(0, config.cash - Math.max(0, used - config.mandatory));

  mandatoryLeftEl = document.getElementById("mandatoryLeft");
  cashLeftEl = document.getElementById("cashLeft");

  mandatoryLeftEl.textContent = mandatoryLeft + "h";
  cashLeftEl.textContent = cashLeft + "h";

  document.getElementById("mandatoryBar").style.width =
    (mandatoryLeft / config.mandatory * 100) + "%";

  document.getElementById("cashBar").style.width =
    (cashLeft / config.cash * 100) + "%";
}

init();
</script>
</body>
</html>
